# ============================================================
# Quantity Measurement App - Application Properties
# This file contains repository, environment, database,
# connection pool, and logging related configuration.
# ============================================================

# ------------------------------------------------------------
# Repository Configuration
# Choose how measurement data should be stored:
# "cache"    -> store only in memory
# "database" -> store in the configured database
# ------------------------------------------------------------
repository.type=database

# ------------------------------------------------------------
# Environment Configuration
# Defines the current application environment.
# Common values:
# development -> local development
# testing     -> test execution
# production  -> real deployment setup
# ------------------------------------------------------------
app.env=development

# ============================================================
# H2 Database Configuration
# H2 is a lightweight embedded Java database.
# AUTO_SERVER=TRUE allows multiple connections to the same file.
# This is the currently active database setup for the project.
# ============================================================
db.url=jdbc:h2:./quantitymeasurementdb;AUTO_SERVER=TRUE
db.username=
db.password=
db.driver=org.h2.Driver
db.pool-size=5

# ============================================================
# HikariCP Connection Pool Configuration
# These properties define how pooled database connections
# should be managed by the application.
# ============================================================
db.hikari.maximum-pool-size=10
db.hikari.minimum-idle=2
db.hikari.connection-timeout=30000
db.hikari.idle-timeout=600000
db.hikari.max-lifetime=1800000
db.hikari.pool-name=QuantityMeasurementPool
db.hikari.connection-test-query=SELECT 1

# ============================================================
# MySQL Database Configuration
# Uncomment these properties and provide correct values
# if the project is later switched to MySQL.
# ============================================================
# db.url=jdbc:mysql://localhost:3306/quantity_measurement?useSSL=false&serverTimezone=UTC
# db.username=root
# db.password=yourpassword
# db.driver=com.mysql.cj.jdbc.Driver

# ============================================================
# PostgreSQL Database Configuration
# Uncomment these properties and provide correct values
# if the project is later switched to PostgreSQL.
# ============================================================
# db.url=jdbc:postgresql://localhost:5432/quantity_measurement
# db.username=postgres
# db.password=yourpassword
# db.driver=org.postgresql.Driver

# ============================================================
# Logging Configuration
# root level controls overall application logs
# package level controls logs for this project package
# console pattern defines how logs appear in terminal
# ============================================================
logging.level.root=INFO
logging.level.com.app.quantitymeasurement=DEBUG
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} - %logger{36} - %msg%n